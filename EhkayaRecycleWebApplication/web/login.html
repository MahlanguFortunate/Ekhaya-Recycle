<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recycle Ekhaya - Login</title>

        <link rel="stylesheet" href="styling/landingPagecss.css">
    </head>
    <body>

        <div class="login-wrapper">
            <div class="login-bg"></div>
            <div class="login-overlay"></div>

            <div class="login-box">
                <h2 class="login-title">LOGIN</h2>

                <form class="login-form" action="LoginServlet.do" method="POST">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <button type="submit" class="login-btn">LOG IN</button>
                </form>

                <p class="signup-text">
                    Don't have account?
                    <a href="signup_select.html">Sign up</a>
                </p>

                <p>
                    <a href="forgot_password.jsp" class="signup-text">Forgot Password?</a>
                </p>

            </div>
        </div>

    </body>
</html>
